name: Weekly Competitor Watch

on:
  schedule:
    # 這裡代表台灣時間每週三下午 2:00 (UTC 6:00)
    - cron: '0 6 * * 3'
  workflow_dispatch:      # 這是你的手動測試按鈕，請務必保留

# 這裡加入全域設定，解決你看到的 Node.js 20 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 強制安裝最新版本以支援 v1 正式接口
          pip install -U google-generativeai requests

      - name: Run Monitoring Script
        env:
          # 這裡必須跟你的 GitHub Secrets 名稱完全一致
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        # ⚠️ 這裡要確保檔名跟你的 Python 檔案一模一樣
        run: python competitor_monitor.py
